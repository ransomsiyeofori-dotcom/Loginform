 <title>Forgot Password</title>
 <style>
 
 * { box-sizing: border-box;}
 body { background-color: #E5E7E9;

        margin: 0px;
         font-family: Iosevka Charon Mono, monospace;

 form { display: flex;

       border-style: none;
       height: 500px;

       border-radius: 15px;
       box-shadow: 0 0 15px gray;
       width: 80%;
       margin-left: 10%;
       position: relative;}

input { width: 80%;
         margin-left: 10%;
         height: 50px;
         border-style: solid;
         border-radius: 10px;
         border-width: 0.5px;
         border-color: #1B263B;

button { width: 80%;
         margin-left: 10%;

label { margin-left: 30px;

  label { margin-left: 80px;

a { text-align: center;

        }

 </head>
 <body>
   
  


    

  <form id="myForm">
    <div class="container">
     <h1>Forgot your password</h1><br>
    
    <p>Please enter the email address you'd like your password reset information sent to </p><br>
    </div>
<label for="email">Enter email address</label>
<input type="email" placeholder="email"
id="email" class="email" />
<p id="text" class="text"></p>


<button type="submit" id="btn">Request reset link</button>
      <a href="index.html">Back To Login</a>
    
  
  </form>
   
   
   <script>
const input = document.getElementById("email");
const btn = document.getElementById("btn");
const form = document.getElementById("myForm");
const text = document.getElementById("text");
const count = document.getElementById("count");

input.addEventListener("input", function(){ const inputValue = input.value.trim();
if (inputValue.length === 0){input.style.border = "2px solid red";}
else if (!inputValue.includes("@") || 
        !inputValue.includes("."))
        {text.style.color = "red";
          text.textContent = "missing @ or .";}

else { input.style.border = "2px solid green";
   text.style.color = "green"
       text.textContent = "Good!";
       }
});


// final validation //
form.addEventListener("submit", function(e){e.preventDefault();

const inputValue = input.value.trim();

if ( inputValue.includes("@") &&
     inputValue.includes(".") &&
     inputValue !== ""){ alert("Link has been sent to your email");}
 
  else { alert("field must be filled correctly");}
console.log("submitted");
});
     
   </script>
